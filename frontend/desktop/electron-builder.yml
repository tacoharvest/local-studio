appId: org.vllm.studio.desktop
productName: vLLM Studio
asar: true

files:
  - desktop/dist/**
  - package.json

extraResources:
  - from: .next/standalone
    to: app/frontend/.next/standalone
    filter:
      - "**/*"
  - from: .desktop-pi-runtime/node_modules
    to: app/node_modules
    filter:
      - "**/*"
  - from: .next/static
    to: app/frontend/.next/standalone/.next/static
    filter:
      - "**/*"
  - from: .next/static
    to: app/frontend/.next/standalone/frontend/.next/static
    filter:
      - "**/*"
  - from: public
    to: app/frontend/.next/standalone/public
    filter:
      - "**/*"
  - from: public
    to: app/frontend/.next/standalone/frontend/public
    filter:
      - "**/*"
  - from: desktop/resources/pi-extensions
    to: desktop/resources/pi-extensions
    filter:
      - "**/*"

directories:
  output: dist-desktop
  buildResources: desktop/resources

mac:
  icon: desktop/resources/icon.icns
  category: public.app-category.developer-tools
  # Keep macOS TCC permissions (Accessibility / Screen Recording) stable
  # across local rebuilds. This identity is a self-signed Code Signing cert in
  # the login keychain when no Apple Developer ID identity is available.
  identity: vLLM Studio Local Dev
  timestamp: none
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: desktop/resources/entitlements.mac.plist
  entitlementsInherit: desktop/resources/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - AppImage
